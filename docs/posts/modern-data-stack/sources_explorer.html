<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sources Explorer</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { margin: 0; padding: 0; background: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const sources = [
  {
    id: "firebase",
    name: "Firebase / GA4",
    icon: "🔥",
    color: "#ea580c",
    bg: "#fff7ed",
    type: "Product Analytics",
    desc: "In-app events, screen views, user properties. Native BigQuery export (free).",
    columns: ["event_timestamp", "event_name", "user_pseudo_id", "platform", "geo.country", "device.model"],
    rows: [
      ["2025-02-24 08:12:03", "screen_view", "a1b2c3d4e5", "ANDROID", "VN", "Samsung S24"],
      ["2025-02-24 08:12:18", "add_to_cart", "a1b2c3d4e5", "ANDROID", "VN", "Samsung S24"],
      ["2025-02-24 08:13:45", "purchase", "a1b2c3d4e5", "ANDROID", "VN", "Samsung S24"],
      ["2025-02-24 09:01:22", "first_open", "f6g7h8i9j0", "IOS", "US", "iPhone 15"],
      ["2025-02-24 09:02:10", "screen_view", "f6g7h8i9j0", "IOS", "US", "iPhone 15"],
    ]
  },
  {
    id: "onesignal",
    name: "OneSignal",
    icon: "🔔",
    color: "#dc2626",
    bg: "#fef2f2",
    type: "Push Notifications",
    desc: "Push delivery, open rates, click-through. Tracks re-engagement from notifications.",
    columns: ["sent_at", "notification_id", "player_id", "platform", "delivered", "clicked"],
    rows: [
      ["2025-02-24 10:00:00", "notif_sale_feb", "pid_001", "android", "true", "true"],
      ["2025-02-24 10:00:00", "notif_sale_feb", "pid_002", "ios", "true", "false"],
      ["2025-02-24 10:00:00", "notif_sale_feb", "pid_003", "android", "false", "false"],
      ["2025-02-24 14:00:00", "notif_cart_remind", "pid_001", "android", "true", "true"],
      ["2025-02-24 14:00:00", "notif_cart_remind", "pid_004", "ios", "true", "false"],
    ]
  },
  {
    id: "facebook",
    name: "Facebook Ads",
    icon: "📘",
    color: "#1d4ed8",
    bg: "#eff6ff",
    type: "Paid Acquisition",
    desc: "Campaign spend, impressions, clicks, installs, cost-per-install from Meta ads.",
    columns: ["date", "campaign_name", "adset_name", "impressions", "clicks", "spend_usd", "installs"],
    rows: [
      ["2025-02-24", "VN_Retarget_Feb", "Lookalike_1pct", "45,200", "1,230", "152.40", "87"],
      ["2025-02-24", "VN_Retarget_Feb", "Interest_Shop", "32,100", "890", "98.50", "52"],
      ["2025-02-24", "US_Install_Feb", "Broad_18_35", "128,500", "3,420", "890.00", "210"],
      ["2025-02-23", "VN_Retarget_Feb", "Lookalike_1pct", "41,800", "1,105", "142.10", "79"],
      ["2025-02-23", "US_Install_Feb", "Broad_18_35", "115,200", "2,980", "812.50", "185"],
    ]
  },
  {
    id: "google_ads",
    name: "Google Ads",
    icon: "📊",
    color: "#16a34a",
    bg: "#f0fdf4",
    type: "Paid Acquisition",
    desc: "Search, display, UAC campaigns. Install attribution, cost, conversions.",
    columns: ["date", "campaign_name", "campaign_type", "impressions", "clicks", "cost_usd", "conversions"],
    rows: [
      ["2025-02-24", "App_Install_VN", "UAC", "98,400", "2,150", "215.30", "134"],
      ["2025-02-24", "App_Install_US", "UAC", "210,000", "5,800", "1,420.00", "320"],
      ["2025-02-24", "Brand_Search_VN", "Search", "12,300", "3,100", "85.60", "410"],
      ["2025-02-23", "App_Install_VN", "UAC", "91,200", "1,980", "198.70", "121"],
      ["2025-02-23", "Brand_Search_VN", "Search", "11,800", "2,950", "79.40", "385"],
    ]
  },
  {
    id: "appsflyer",
    name: "AppsFlyer",
    icon: "🎯",
    color: "#7c3aed",
    bg: "#f5f3ff",
    type: "Attribution",
    desc: "Install attribution, deep link tracking, multi-touch attribution across all media sources.",
    columns: ["attributed_at", "appsflyer_id", "media_source", "campaign", "event_name", "revenue_usd"],
    rows: [
      ["2025-02-24 08:11:50", "af_id_001", "Facebook Ads", "VN_Retarget_Feb", "install", "0.00"],
      ["2025-02-24 08:13:45", "af_id_001", "Facebook Ads", "VN_Retarget_Feb", "purchase", "12.50"],
      ["2025-02-24 09:01:20", "af_id_002", "Google Ads", "App_Install_US", "install", "0.00"],
      ["2025-02-24 10:30:00", "af_id_003", "Organic", "(none)", "install", "0.00"],
      ["2025-02-24 11:45:12", "af_id_003", "Organic", "(none)", "add_to_cart", "0.00"],
    ]
  },
  {
    id: "branch",
    name: "Branch.io",
    icon: "🔗",
    color: "#0d9488",
    bg: "#f0fdfa",
    type: "Deep Linking & Attribution",
    desc: "Deep links, deferred deep links, cross-platform attribution, referral tracking.",
    columns: ["timestamp", "branch_id", "channel", "campaign", "event", "referring_link"],
    rows: [
      ["2025-02-24 07:55:10", "br_id_001", "Facebook", "VN_Feb_Sale", "install", "app.link/feb-sale"],
      ["2025-02-24 07:56:30", "br_id_001", "Facebook", "VN_Feb_Sale", "open", "app.link/feb-sale"],
      ["2025-02-24 08:20:00", "br_id_002", "Email", "Weekly_Digest", "open", "app.link/digest-w8"],
      ["2025-02-24 09:10:44", "br_id_003", "Organic", "(none)", "install", "(direct)"],
      ["2025-02-24 10:05:00", "br_id_004", "Referral", "refer_a_friend", "install", "app.link/ref-uid42"],
    ]
  },
];

function App() {
  const [active, setActive] = useState("firebase");
  const src = sources.find(s => s.id === active);

  return (
    <div style={{ padding: "24px 20px", maxWidth: 960, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 800, color: "#0f172a", margin: 0 }}>Data Sources</h1>
        <p style={{ color: "#64748b", fontSize: 13, margin: "6px 0 0" }}>
          Typical sources for a mobile e-commerce app — from install attribution to in-app events
        </p>
      </div>

      {/* Source tabs */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", marginBottom: 24 }}>
        {sources.map(s => {
          const isActive = s.id === active;
          return (
            <button key={s.id} onClick={() => setActive(s.id)} style={{
              display: "flex", alignItems: "center", gap: 6,
              padding: "8px 16px", borderRadius: 10, cursor: "pointer",
              border: isActive ? `2px solid ${s.color}` : "1.5px solid #e2e8f0",
              background: isActive ? s.bg : "#fff",
              color: isActive ? s.color : "#64748b",
              fontWeight: isActive ? 700 : 500,
              fontSize: 13,
              transition: "all 0.2s",
              boxShadow: isActive ? `0 2px 8px ${s.color}22` : "none",
            }}>
              <span style={{ fontSize: 16 }}>{s.icon}</span>
              {s.name}
            </button>
          );
        })}
      </div>

      {/* Source detail card */}
      {src && (
        <div style={{
          background: "#fff", borderRadius: 16, border: `1.5px solid ${src.color}33`,
          boxShadow: "0 4px 20px rgba(0,0,0,0.06)", overflow: "hidden",
          animation: "fadeIn 0.25s ease",
        }}>
          <style>{`@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }`}</style>

          {/* Card header */}
          <div style={{
            background: `linear-gradient(135deg, ${src.bg}, #fff)`,
            padding: "20px 24px", borderBottom: `1px solid ${src.color}22`,
            display: "flex", alignItems: "center", gap: 14,
          }}>
            <span style={{ fontSize: 32 }}>{src.icon}</span>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: src.color }}>{src.name}</h2>
                <span style={{
                  fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8,
                  background: src.bg, color: src.color, border: `1px solid ${src.color}44`,
                  padding: "2px 10px", borderRadius: 20,
                }}>{src.type}</span>
              </div>
              <p style={{ margin: "4px 0 0", color: "#64748b", fontSize: 13 }}>{src.desc}</p>
            </div>
          </div>

          {/* Sample data table */}
          <div style={{ padding: "16px 24px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
              <span style={{ fontSize: 12, color: "#94a3b8" }}>📄</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1 }}>Sample Data</span>
            </div>
            <div style={{ overflowX: "auto", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'JetBrains Mono', 'Fira Code', monospace" }}>
                <thead>
                  <tr>
                    {src.columns.map((col, i) => (
                      <th key={i} style={{
                        padding: "10px 14px", textAlign: "left",
                        background: "#f8fafc", color: src.color,
                        fontWeight: 700, fontSize: 10.5, textTransform: "uppercase",
                        letterSpacing: 0.5, borderBottom: "2px solid #e2e8f0",
                        whiteSpace: "nowrap",
                      }}>{col}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {src.rows.map((row, ri) => (
                    <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#fafbfc" }}>
                      {row.map((cell, ci) => (
                        <td key={ci} style={{
                          padding: "8px 14px", color: "#334155",
                          borderBottom: "1px solid #f1f5f9",
                          whiteSpace: "nowrap",
                        }}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Flow hint */}
          <div style={{
            padding: "12px 24px 16px",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <span style={{ color: src.color, fontSize: 14 }}>→</span>
            <span style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic" }}>
              {src.id === "firebase" && "Exported daily to BigQuery via native streaming export (free)."}
              {src.id === "onesignal" && "Pulled via OneSignal REST API → dlt pipeline → BigQuery."}
              {src.id === "facebook" && "Pulled via Meta Marketing API → dlt pipeline → BigQuery."}
              {src.id === "google_ads" && "Pulled via Google Ads API or BigQuery Data Transfer Service (free)."}
              {src.id === "appsflyer" && "Exported via Push API or Pull API → dlt pipeline → BigQuery."}
              {src.id === "branch" && "Exported via Webhooks or Data Export API → dlt pipeline → BigQuery."}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

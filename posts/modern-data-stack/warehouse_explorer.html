<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Data Warehouse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { margin: 0; padding: 0; background: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const phases = [
  {
    id: "early",
    label: "Early Stage",
    sub: "< 50GB, 1-3 users",
    icon: "\u{1F331}",
    color: "#059669",
    bg: "#ecfdf5",
    warehouse: "BigQuery (free tier)",
    costRange: "$0-10/mo",
    diagram: [
      { name: "Firebase / GA4", arrow: "Native Export", dest: "BigQuery", color: "#ea580c" },
      { name: "Google Ads", arrow: "Data Transfer", dest: "BigQuery", color: "#16a34a" },
      { name: "Facebook Ads", arrow: "dlt pipeline", dest: "BigQuery", color: "#1d4ed8" },
      { name: "AppsFlyer", arrow: "dlt pipeline", dest: "BigQuery", color: "#7c3aed" }
    ],
    why: [
      "Firebase/GA4 can ONLY export to BigQuery natively — it's the path of least resistance",
      "BigQuery free tier: 10GB storage + 1TB queries/month — most small apps never exceed this",
      "Serverless — no clusters to manage, no instances to size, pay only for what you scan",
      "All Google sources (GA4, Ads, Search Console) have zero-cost BigQuery connectors",
      "SQL-standard enough — your dbt models will work with minor tweaks if you migrate later"
    ],
    pricing: [
      { item: "Storage", free: "10 GB", paid: "$0.02/GB/mo", note: "50GB = ~$0.80/mo" },
      { item: "Queries (on-demand)", free: "1 TB/mo", paid: "$6.25/TB", note: "Most small teams use < 500GB/mo" },
      { item: "Streaming inserts", free: "Free", paid: "Free", note: "Firebase export uses this" },
      { item: "Data Transfer Service", free: "Free", paid: "Free", note: "Google Ads, YouTube, etc" }
    ],
    alternatives: null,
    tips: [
      "Always partition tables by date — this is the #1 cost saver, BQ only scans the partitions you query",
      "Use LIMIT during development but remember: BQ charges for data scanned, not rows returned",
      "Set up cost controls: Budget alerts at $10, $25, $50 to avoid surprises",
      "Prefer scheduled queries or dbt over ad-hoc SELECT * from large tables"
    ]
  },
  {
    id: "growing",
    label: "Growing",
    sub: "50-500GB, 3-10 users",
    icon: "\u{1F33F}",
    color: "#ea580c",
    bg: "#fff7ed",
    warehouse: "BigQuery + MotherDuck",
    costRange: "$20-100/mo",
    diagram: [
      { name: "All sources", arrow: "dlt / native", dest: "BigQuery", color: "#ea580c" },
      { name: "BigQuery", arrow: "sync / attach", dest: "MotherDuck", color: "#0284c7" },
      { name: "MotherDuck", arrow: "fast queries", dest: "Analysts", color: "#7c3aed" }
    ],
    why: [
      "BQ costs start showing up — analysts running dashboards = repeated full-table scans",
      "MotherDuck runs DuckDB in the cloud — sub-second queries on data synced from BQ",
      "Keep BQ as the landing zone (where data arrives), use MotherDuck for interactive analytics",
      "MotherDuck free tier: 10GB storage — good for your most-queried mart tables",
      "Alternatively: just stay on BQ and optimize with partitioning + clustering + materialized views"
    ],
    pricing: [
      { item: "BigQuery storage", free: "n/a", paid: "$0.02/GB", note: "200GB = ~$4/mo" },
      { item: "BigQuery queries", free: "n/a", paid: "$6.25/TB", note: "Dashboards can add up fast" },
      { item: "MotherDuck", free: "10 GB", paid: "$15/mo (100GB)", note: "Only for hot/mart tables" },
      { item: "Total estimate", free: "n/a", paid: "$20-100/mo", note: "Depends on query volume" }
    ],
    alternatives: null,
    tips: [
      "Materialize your dbt mart models — don't let Metabase re-run heavy transforms on every refresh",
      "Move only final mart tables to MotherDuck, keep raw + staging in BQ",
      "Use BQ slot reservations if query costs become predictable (flat-rate pricing)",
      "Monitor with BigQuery INFORMATION_SCHEMA.JOBS to find expensive queries"
    ]
  },
  {
    id: "scale",
    label: "At Scale",
    sub: "500GB+, 10+ users",
    icon: "\u{1F333}",
    color: "#7c3aed",
    bg: "#f5f3ff",
    warehouse: "Consider alternatives",
    costRange: "$100+/mo",
    diagram: [
      { name: "Sources", arrow: "Airbyte / Fivetran", dest: "Snowflake / Databricks", color: "#0284c7" },
      { name: "Snowflake", arrow: "dbt Cloud", dest: "Transformed data", color: "#7c3aed" },
      { name: "Transformed", arrow: "Tableau / Looker", dest: "Stakeholders", color: "#db2777" }
    ],
    why: [
      "BQ on-demand pricing becomes unpredictable at this volume",
      "Snowflake separates storage and compute for more predictable billing",
      "Databricks works if you need Python/Spark alongside SQL",
      "ClickHouse suits real-time analytics on high-volume event streams",
      "Or just stay on BQ with flat-rate pricing, many large companies do"
    ],
    pricing: [
      { item: "BigQuery on-demand", free: "n/a", paid: "$6.25/TB", note: "Unpredictable at 5TB+" },
      { item: "BigQuery flat-rate", free: "n/a", paid: "$500/mo", note: "100 slots, predictable" },
      { item: "Snowflake", free: "n/a", paid: "$2-3/credit", note: "Starts $300+/mo" },
      { item: "Databricks", free: "n/a", paid: "$0.07/DBU+", note: "Compute + storage split" }
    ],
    alternatives: null,
    tips: [
      "Don't migrate just because you can, migration is expensive in time and bugs",
      "BQ flat-rate ($500/mo for 100 slots) is often cheaper than on-demand at scale",
      "If migrating: move dbt models first, then data, then dashboards",
      "Consider a lakehouse pattern: land in GCS/S3, query with any engine"
    ]
  }
];

var Arrow = function(props) {
  return (
    <svg width="24" height="16" viewBox="0 0 24 16" style={{ flexShrink: 0 }}>
      <path d="M0 8 L18 8 M14 3 L20 8 L14 13" fill="none" stroke={props.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

function App() {
  var ref = useState("early");
  var active = ref[0];
  var setActive = ref[1];
  var p = null;
  for (var i = 0; i < phases.length; i++) {
    if (phases[i].id === active) { p = phases[i]; break; }
  }
  if (!p) return null;

  var hasAlts = p.alternatives && p.alternatives.length > 0;

  return (
    <div style={{ padding: "24px 20px", maxWidth: 960, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 800, color: "#0f172a", margin: 0 }}>Cloud Data Warehouse</h1>
        <p style={{ color: "#64748b", fontSize: 13, margin: "6px 0 0" }}>
          Why BigQuery to start, and when to reconsider as you grow
        </p>
      </div>

      <div style={{ display: "flex", gap: 0, justifyContent: "center", marginBottom: 24 }}>
        {phases.map(function(x, idx) {
          var on = x.id === active;
          return (
            <button key={x.id} onClick={function() { setActive(x.id); }} style={{
              padding: "12px 24px", cursor: "pointer",
              border: on ? "2px solid " + x.color : "1.5px solid #e2e8f0",
              borderLeft: idx > 0 ? "none" : undefined,
              borderRadius: idx === 0 ? "10px 0 0 10px" : idx === phases.length - 1 ? "0 10px 10px 0" : "0",
              background: on ? x.bg : "#fff",
              color: on ? x.color : "#64748b",
              fontWeight: on ? 700 : 500, fontSize: 13,
              transition: "all 0.2s",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            }}>
              <span style={{ fontSize: 20 }}>{x.icon}</span>
              <span>{x.label}</span>
              <span style={{ fontSize: 10, opacity: 0.7 }}>{x.sub}</span>
            </button>
          );
        })}
      </div>

      <div key={p.id} style={{
        background: "#fff", borderRadius: 16, border: "1.5px solid " + p.color + "33",
        boxShadow: "0 4px 20px rgba(0,0,0,0.06)", overflow: "hidden",
      }}>

        <div style={{ background: "linear-gradient(135deg, " + p.bg + ", #fff)", padding: "20px 24px", borderBottom: "1px solid " + p.color + "22", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 32 }}>{p.icon}</span>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: p.color }}>{p.warehouse}</h2>
              <span style={{ fontSize: 12, color: "#64748b" }}>{p.label} — {p.sub}</span>
            </div>
          </div>
          <div style={{ background: p.bg, border: "1.5px solid " + p.color + "44", borderRadius: 20, padding: "6px 18px" }}>
            <span style={{ fontWeight: 800, color: p.color, fontSize: 16 }}>{p.costRange}</span>
          </div>
        </div>

        <div style={{ padding: "20px 24px" }}>

          {/* Data flow */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Data flow</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {p.diagram.map(function(d, di) {
                return (
                  <div key={di} style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                    <div style={{ background: "#f8fafc", border: "1.5px solid #e2e8f0", borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 600, color: "#334155", minWidth: 110, textAlign: "center" }}>{d.name}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <Arrow color={d.color} />
                      <span style={{ fontSize: 10, color: d.color, fontWeight: 600, fontStyle: "italic" }}>{d.arrow}</span>
                      <Arrow color={d.color} />
                    </div>
                    <div style={{ background: p.bg, border: "1.5px solid " + p.color + "44", borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 700, color: p.color, minWidth: 110, textAlign: "center" }}>{d.dest}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Why */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
              {p.id === "scale" ? "Why reconsider" : "Why BigQuery"}
            </div>
            <div style={{ background: p.bg, border: "1px solid " + p.color + "33", borderRadius: 10, padding: 14 }}>
              {p.why.map(function(w, wi) {
                return (
                  <div key={wi} style={{ display: "flex", gap: 8, marginBottom: wi < p.why.length - 1 ? 10 : 0, alignItems: "flex-start" }}>
                    <span style={{ color: p.color, fontWeight: 800, fontSize: 14, lineHeight: "20px" }}>{p.id === "scale" ? "\u26A0" : "\u2713"}</span>
                    <span style={{ color: "#334155", fontSize: 12.5, lineHeight: "20px" }}>{w}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Pricing */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Pricing breakdown</div>
            <div style={{ overflowX: "auto", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "monospace" }}>
                <thead>
                  <tr>
                    <th style={{ padding: "9px 12px", textAlign: "left", background: "#f8fafc", color: p.color, fontWeight: 700, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: "2px solid #e2e8f0" }}>Component</th>
                    <th style={{ padding: "9px 12px", textAlign: "left", background: "#f8fafc", color: p.color, fontWeight: 700, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: "2px solid #e2e8f0" }}>Free tier</th>
                    <th style={{ padding: "9px 12px", textAlign: "left", background: "#f8fafc", color: p.color, fontWeight: 700, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: "2px solid #e2e8f0" }}>Paid</th>
                    <th style={{ padding: "9px 12px", textAlign: "left", background: "#f8fafc", color: p.color, fontWeight: 700, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, borderBottom: "2px solid #e2e8f0" }}>Note</th>
                  </tr>
                </thead>
                <tbody>
                  {p.pricing.map(function(r, ri) {
                    var freeColor = (r.free === "Free" || r.free === "10 GB" || r.free === "1 TB/mo") ? "#059669" : "#94a3b8";
                    return (
                      <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#fafbfc" }}>
                        <td style={{ padding: "8px 12px", fontWeight: 600, color: "#1e293b", borderBottom: "1px solid #f1f5f9" }}>{r.item}</td>
                        <td style={{ padding: "8px 12px", color: freeColor, fontWeight: 600, borderBottom: "1px solid #f1f5f9" }}>{r.free}</td>
                        <td style={{ padding: "8px 12px", color: "#334155", borderBottom: "1px solid #f1f5f9" }}>{r.paid}</td>
                        <td style={{ padding: "8px 12px", color: "#94a3b8", fontSize: 11, borderBottom: "1px solid #f1f5f9", fontStyle: "italic" }}>{r.note}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Alternatives */}
          {hasAlts && (
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Alternatives to consider</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {p.alternatives.map(function(a, ai) {
                  return (
                    <div key={ai} style={{ display: "flex", alignItems: "center", gap: 12, background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "10px 16px" }}>
                      <div style={{ minWidth: 120 }}>
                        <div style={{ fontWeight: 700, color: "#1e293b", fontSize: 13 }}>{a.name}</div>
                        <div style={{ fontSize: 10, color: "#94a3b8" }}>{a.type}</div>
                      </div>
                      <div style={{ flex: 1, fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>{a.fit}</div>
                      <span style={{ fontSize: 11, fontWeight: 700, color: p.color, background: p.bg, border: "1px solid " + p.color + "33", padding: "2px 10px", borderRadius: 16, whiteSpace: "nowrap" }}>{a.cost}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Tips */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Cost-saving tips</div>
            <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: 14 }}>
              {p.tips.map(function(t, ti) {
                return (
                  <div key={ti} style={{ display: "flex", gap: 8, marginBottom: ti < p.tips.length - 1 ? 8 : 0, alignItems: "flex-start" }}>
                    <span style={{ color: "#d97706", fontWeight: 800, fontSize: 13, lineHeight: "20px" }}>{"\u2192"}</span>
                    <span style={{ color: "#92400e", fontSize: 12.5, lineHeight: "20px" }}>{t}</span>
                  </div>
                );
              })}
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
